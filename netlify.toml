# Static site — no build step needed
[build]
  publish = "."
  command = ""

# Nice security headers for a static knowledge base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
