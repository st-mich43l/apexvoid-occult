# nginx phục vụ site tĩnh Void Occult (mount nguyên repo vào /usr/share/nginx/html).
# "/" -> trang chủ index.html. Chặn lộ source backend & file nhạy cảm (.env, .git...).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;                 # "/" => trang chủ

  charset utf-8;

  # KHÔNG lộ source backend (chứa .env có API key) & file ẩn của repo
  location ^~ /backend/ { deny all; return 404; }
  location ^~ /deploy/  { deny all; return 404; }
  location ~ /\.        { deny all; return 404; }   # /.env, /.git, /.gitignore, /.dockerignore...

  location / {
    try_files $uri $uri/ =404;
  }
}
