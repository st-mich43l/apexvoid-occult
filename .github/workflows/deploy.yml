name: Build & Deploy

# Build apexvoid-occult images, push to Docker Hub, then deploy on the VPS by pulling
# the new tag (via ansible-library). Config/secrets live in ansible-library;
# this repo needs DOCKERHUB_TOKEN + ANSIBLE_VAULT_PASSWORD.

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "src/**"
      - "deploy/**"
      - "deployment-template/**"
      - "index.html"
      - "package*.json"
      - "vite.config.ts"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Node deps
        run: npm ci
      - name: Test Frontend
        run: npm run typecheck && npm test
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python deps
        run: pip install -r backend/requirements.txt
      - name: Test Backend
        run: cd backend && python -m unittest discover -s tests

  release:
    needs: test
    permissions:
      contents: read
    uses: st-mich43l/action-library/.github/workflows/build-push-deploy.yml@e9594acd93befdd1020ad06687ba05d03b14c80e
    with:
      project: apexvoid-occult
      registry-namespace: mich43l
      images: >-
        [
          {"name": "apexvoid-occult-backend",  "context": "backend", "dockerfile": "backend/Dockerfile"},
          {"name": "apexvoid-occult-frontend", "context": ".",        "dockerfile": "deploy/frontend.Dockerfile"}
        ]
    secrets:
      registry-token: ${{ secrets.DOCKERHUB_TOKEN }}
      vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
