name: Build & Deploy

# Build apexvoid-occult images, push to Docker Hub, then deploy on the VPS by pulling
# the new tag (via ansible-library). Config/secrets live in ansible-library;
# this repo needs DOCKERHUB_TOKEN + ANSIBLE_VAULT_PASSWORD.

on:
  pull_request:
    branches: [master]
    paths:
      - "backend/**"
      - "src/**"
      - "deploy/**"
      - "deployment-template/**"
      - "index.html"
      - "package*.json"
      - "vite.config.ts"
      - ".github/workflows/deploy.yml"
      - "research/annual-axes/distribution/v0.8/**"
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "src/**"
      - "deploy/**"
      - "deployment-template/**"
      - "index.html"
      - "package*.json"
      - "vite.config.ts"
      - ".github/workflows/deploy.yml"
      - "research/annual-axes/distribution/v0.8/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Node deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test Frontend
        run: npm test
      - name: Build Frontend
        run: npm run build
      - name: Annual Axes V0.8 core
        run: npm run test:annual-axes-v08
      - name: Annual Axes V0.8 holdout
        run: npm run test:annual-axes-v08-holdout
      - name: Annual Axes V0.8 UI proof
        run: npm run test:annual-axes-v08-ui
      - name: Annual Axes distribution audit (advisory)
        run: npm run test:annual-axes-distribution:fast
      - name: Check PR patch for whitespace errors
        if: github.event_name == 'pull_request'
        run: |
          git diff --check \
            "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
      - name: Check pushed commit for whitespace errors
        if: github.event_name != 'pull_request'
        run: git show --check --oneline --no-renames HEAD
      - name: Confirm V0.8 fixtures were not rewritten
        run: |
          if [ -n "$(git status --short -- research/annual-axes/distribution/v0.8/)" ]; then
            echo "V0.8 fixture files were modified by tests — fixtures must remain read-only"
            git status --short -- research/annual-axes/distribution/v0.8/
            exit 1
          fi
      - name: Confirm working tree clean after tests
        run: |
          if [ -n "$(git status --short)" ]; then
            echo "Working tree dirty after tests"
            git status --short
            exit 1
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python deps
        run: pip install -r backend/requirements.txt
      - name: Test Backend
        run: cd backend && python -m unittest discover -s tests

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
    uses: st-mich43l/action-library/.github/workflows/build-push-deploy.yml@e9594acd93befdd1020ad06687ba05d03b14c80e
    with:
      project: apexvoid-occult
      registry-namespace: mich43l
      images: >-
        [
          {"name": "apexvoid-occult-backend",  "context": "backend", "dockerfile": "backend/Dockerfile"},
          {"name": "apexvoid-occult-frontend", "context": ".",        "dockerfile": "deploy/frontend.Dockerfile"}
        ]
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
