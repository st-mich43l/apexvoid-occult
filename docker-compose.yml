# Void Occult — chạy local: backend (FastAPI) + frontend (nginx static).
#   cp backend/.env.example backend/.env   # rồi điền GEMINI_API_KEY
#   docker compose up --build
# Trang chủ: http://localhost:8080/         (index.html)
# Lá số:     http://localhost:8080/pages/purple-star/tu-vi-dau-so.html
# Backend:   http://localhost:8000/health
services:
  backend:
    build: ./backend
    container_name: voidocc-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app          # hot-reload code khi dev
    # Container Docker mặc định không có route IPv6; google-genai (httpx) thử IPv6 trước
    # -> [Errno 101] Network is unreachable. Tắt IPv6 trong container để dùng IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: voidocc-frontend
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro                               # site tĩnh (cả repo)
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro     # "/" = homepage + chặn /backend, dotfiles
    depends_on:
      - backend
    restart: unless-stopped
