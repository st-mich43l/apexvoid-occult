# Void Occult — backend (FastAPI) + frontend (nginx static).
#   cp backend/.env.example backend/.env   # rồi điền GEMINI_API_KEY
#   Start ../routing first, then: docker compose up --build
# Trang chủ: http://void-occult.localhost/
# Backend:   http://void-occult.localhost/health
services:
  backend:
    build: ./backend
    container_name: voidocc-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app          # hot-reload code khi dev
    # Container Docker mặc định không có route IPv6; google-genai (httpx) thử IPv6 trước
    # -> [Errno 101] Network is unreachable. Tắt IPv6 trong container để dùng IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - routing

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    image: void-occult-frontend:local
    container_name: voidocc-frontend
    expose:
      - "80"
    depends_on:
      - backend
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    restart: unless-stopped
    networks:
      - routing

networks:
  routing:
    name: "${ROUTING_NETWORK:-routing}"
    external: true
